[project]
site_name = "PILATES"
repo_url = "https://github.com/LBNL-UCB-STI/PILATES"
site_description = "Integrated land use, travel demand, traffic, and vehicle fleet simulation workflows"
site_author = "Zach Needell"
site_url = "https://LBNL-UCB-STI.github.io/PILATES/"
copyright = """
Copyright &copy; 2026 The Regents of the University of California, through Lawrence Berkeley National Laboratory
"""
nav = [
    { "Home" = "index.md" },
    { "Get Started" = ["getting_started.md", "cli_reference.md", "configuration_reference.md", "data_bootstrap.md"] },
    { "Workflow" = ["workflow_primer.md", "architecture.md", "provenance_and_lineage.md", "artifact_flow.md", "lineage_map.md"] },
    { "Models & Integration" = ["model_integration_guide.md", "adding_a_model.md", "zone_id_management.md", "land_use_skim_alignment.md"] },
    { "Operations & Data" = ["database-setup.md", "database_documentation_guide.md", "database_schema_reference.md", "artifact_facet_catalog.md", "hpc_execution.md", "test_output_preservation.md", "troubleshooting.md"] },
]
extra_css = ["stylesheets/extra.css"]

[project.theme]
favicon = "assets/pilates-mark.svg"
logo = "assets/pilates-mark.svg"
language = "en"
features = [
    "announce.dismiss",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "header.autohide",
    "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.theme.font]
text = "Libre Franklin"
code = "JetBrains Mono"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/LBNL-UCB-STI/PILATES"
