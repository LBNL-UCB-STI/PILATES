name: pilates
channels:
  - conda-forge
  - defaults
dependencies:
  # ============================================================================
  # Core Python and minimal conda packages
  # ============================================================================
  - python=3.10
  - pip

  # Only critical scientific packages via conda (for binary compatibility)
  - numpy=1.23.*
  - pandas=1.5.*
  - scipy=1.11.*
  - geos>=3.9

  # ============================================================================
  # All other packages via pip (faster than conda for many packages)
  # ============================================================================
  - pip:
    # Core utilities
    - six==1.17.0
    - python-dateutil==2.9.0.post0
    - pytz==2025.1
    - tzdata>=2022.1

    # Scientific/data packages
    - numexpr==2.10.2
    - bottleneck==1.4.2
    - py-cpuinfo
    - blosc2~=2.0.0
    - tables==3.8.0
    - h5py
    - matplotlib==3.7.1
    - numba==0.57.0

    # Geospatial packages
    - shapely==1.8.5
    - pyproj==3.6.1
    - pygeos==0.14
    - geopandas==0.11.1

    # Data format packages
    - pyarrow==10.0.1
    - fastparquet==0.8.3
    - cramjam>=2.3.0
    - fsspec
    - openmatrix
    - xarray==2023.12.0
    - zarr==2.16.1
    - asciitree
    - numcodecs>=0.10.0
    - fasteners

    # Utility packages
    - requests
    - urllib3<2.0.0
    - certifi
    - charset-normalizer
    - idna
    - tqdm
    - pyyaml
    - psutil
    - joblib
    - docker
    - sortedcontainers
    - packaging>=21.0

    # Provenance tracking
    - openlineage-python
    - attrs>=20.0
    - httpx>=0.27.0
    - build>=1.2.2

