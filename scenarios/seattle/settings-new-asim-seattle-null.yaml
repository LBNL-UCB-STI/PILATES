# =============================================================================
# INFRASTRUCTURE CONFIGURATION
# Container management (Docker/Singularity) and execution environment
# =============================================================================
infrastructure:
  container_manager: singularity
  singularity_images:
    urbansim: docker://jdcaicedo/urbansim_demos:v0.1.1
    atlas: docker://ghcr.io/lbnl-science-it/atlas:sfb-v2.0.12
    activitysim: docker://zaneedell/activitysim:0.2.5
    beam: docker://haitamlaarabi/beam:1.1-beta-v260314
  docker_images:
    urbansim: jdcaicedo/urbansim_demos:v0.1.1
    atlas: ghcr.io/lbnl-science-it/atlas:v1.0.7
    beam: haitamlaarabi/beam:1.1-beta-v260314
    activitysim: zaneedell/activitysim:0.1.4
    polaris: tbd
  docker_config:
    stdout: false
    pull_latest: false

# =============================================================================
# URBANSIM CONFIGURATION
# Land use model settings
# =============================================================================
urbansim:
  region_id: "53199100"
  local_data_input_folder: pilates/urbansim/data/
  local_mutable_data_folder: urbansim/data/
  client_base_folder: /base/demos_urbansim
  client_data_folder: /base/demos_urbansim/data/
  input_file_template: "custom_mpo_{region_id}_model_data.h5"
  input_file_template_year: "custom_mpo_{region_id}_model_data_{start_year}.h5"
  output_file_template: "model_data_{year}.h5"
  command_template: "-r {0} -i {1} -y {2} -f {3} -t {4}"
  region_mappings:
    region_to_region_id:
      sfbay: "06197001"
      austin: "48197301"
      seattle: "53199100"

# =============================================================================
# ACTIVITYSIM CONFIGURATION
# Activity-based travel demand model settings
# =============================================================================
activitysim:
  household_sample_size: 250000
  chunk_size: 12000000000
  num_processes: 25
  file_format: parquet
  local_input_folder: pilates/activitysim/data/
  local_mutable_data_folder: activitysim/data/
  local_output_folder: activitysim/output/
  local_configs_folder: pilates/activitysim/configs/
  local_mutable_configs_folder: activitysim/configs/
  validation_folder: pilates/activitysim/validation
  subdir: configs
  main_configs_dir: configs_extended
  region_mappings:
    region_to_subdir:
      austin: austin
      detroit: detroit
      sfbay: activitysim/examples/prototype_mtc_clean
      seattle: activitysim/examples/prototype_mtc_clean
    region_to_bucket:
      austin: austin-activitysim
      detroit: detroit-activitysim
      sfbay: bayarea-activitysim
      seattle: seattle-activitysim
  from_urbansim_col_maps:
    households:
      persons: PERSONS
      PERSONS: hhsize
      cars: auto_ownership
      workers: num_workers
    persons:
      member_id: PNUM
    land_use:
      ZONE: TAZ
      COUNTY: county_id
  to_urbansim_col_maps:
    households:
      hhsize: persons
      num_workers: workers
      auto_ownership: cars
    persons:
      PNUM: member_id
      workplace_taz: work_zone_id
      school_taz: school_taz_id
  output_tables:
    prefix: final_
    tables:
    - checkpoints
    - land_use
    - households
    - persons
    - tours
    - trips
    - joint_tour_participants
    - plans
  command_template: "--households_sample_size {0} -m {1} -g {2}"
  database:
    enabled: true
    use_processed_data: true
    year: 2018
  warm_start_activities: false
  replan_iters: 0
  replan_hh_samp_size: 0
  replan_after: non_mandatory_tour_scheduling
  final_plans_folder: pilates/activitysim/output/final_plans

# =============================================================================
# BEAM CONFIGURATION
# Transportation network simulation settings
# =============================================================================
beam:
  config: seattle-pilates.conf
  sample: 1.0
  replanning_portion: 1.0
  memory: "${BEAM_MEMORY}"
  local_input_folder: pilates/beam/production/
  local_mutable_data_folder: beam/input/
  local_output_folder: beam/beam_output/
  scenario_folder: urbansim/
  router_directory: r5/seattle-cbg120-ferry-weakConn-network
  skims_shapefile: shape/block-groups-32048.shp
  skim_zone_source_id_col: sk_zone
  skim_zone_geoid_col: geoid10
  discard_plans_every_year: true
  max_plans_memory: 1
  simulated_hwy_paths:
  - SOV
  - HOV2
  - HOV3
  asim_hwy_measure_map:
    TIME: TIME_minutes
    DIST: DIST_miles
    BTOLL: null
    VTOLL: VTOLL_FAR
  asim_transit_measure_map:
    WAIT: null
    IVT: TOTIVT_IVT_minutes
    TOTIVT: TOTIVT_IVT_minutes
    KEYIVT: KEYIVT_minutes
    FERRYIVT: FERRYIVT_minutes
    FAR: VTOLL_FAR
    DTIM: DTIM_minutes
    DDIST: DDIST_miles
    WAUX: WAUX_minutes
    WEGR: WEGR_minutes
    WACC: WACC_minutes
    IWAIT: IWAIT_minutes
    XWAIT: XWAIT_minutes
    BOARDS: BOARDS
  asim_ridehail_measure_map:
    WAIT: waitTimeInMinutes
    REJECTIONPROB: unmatchedRequestPortion
  ridehail_path_map:
    RH_SOLO: Solo
    RH_POOLED: Pooled

# =============================================================================
# POSTPROCESSING CONFIGURATION
# Output processing and validation settings
# =============================================================================
postprocessing:
  output_folder: pilates/postprocessing/output
  mep_output_folder: pilates/postprocessing/MEP/
  scenario_definitions:
    name: baseline
    lever: default
    lever_position: 1.0
  validation_metrics:
    growth:
    - population
    - employment
    - residential_units
    commute_dists: null
    mode_shares: null
    auto_ownership: null
    density_gradients:
      rent:
        access:
          var: employment
          cost: minutes
          levels:
          - 15
          - 45
      jobs:
        access:
          var: employment
          cost: minutes
          levels:
          - 15
          - 45
      population:
        access:
          var: employment
          cost: minutes
          levels:
          - 15
          - 45
