# =============================================================================
# RUN CONFIGURATION
# Core run parameters and model selection
# =============================================================================
run:
  region: seattle
  scenario: base
  start_year: 2018
  end_year: 2025
  land_use_freq: 1
  travel_model_freq: 1
  vehicle_ownership_freq: 1
  supply_demand_iters: 6
  output_directory: /global/scratch/users/$USER/pilates-output
  output_run_name: new-asim-new-map-v6-null
  consist_db_local_run: true
  consist_db_filename: provenance.duckdb
  models:
    land_use: null
    travel: beam
    activity_demand: activitysim
    vehicle_ownership: null

