# PILATES Configuration File (Hierarchical Format)
# Generated by scripts/migrate_config.py
# See docs/config_restructure_proposal.md for details

# =============================================================================
# RUN CONFIGURATION
# Core run parameters and model selection
# =============================================================================
run:
  region: sfbay
  scenario: base
  start_year: 2017
  end_year: 2021
  land_use_freq: 1
  travel_model_freq: 2
  vehicle_ownership_freq: 2
  supply_demand_iters: 1
  # Lawrencium storage posture:
  # - output_directory: active durable archive root on Lustre scratch
  # - local_workspace_root: mutable node-local workspace during execution
  # - recovery_archive_roots: colder NFS destinations for post-run promotion
  output_directory: /global/scratch/users/${USER}/pilates-outputs
  output_run_name: consist-sfbay-usim-base-short-mandate
  local_workspace_root: /local/job${SLURM_JOB_ID}/pilates-workspace
  recovery_archive_roots:
    - /clusterfs/beem-core-data-nfs/pilates-outputs
  enable_archive_copy: true
  consist_hashing_strategy: full
  restart_strict: true
  consist_code_identity: callable_module  


  # Keep active DB on node-local flash
  consist_db_local_run: true
  consist_db_filename: provenance.duckdb

  # Startup order: restore from run snapshot first
  consist_db_restore_on_start: true
  consist_db_restore_strict: false

  # If no snapshot exists, seed from shared DB
  consist_db_seed_from_shared_on_start: true
  consist_db_seed_strict: false

  # Periodic + final snapshots
  consist_db_snapshot_enabled: true
  consist_db_snapshot_interval_seconds: 600
  consist_db_snapshot_on_outer_iteration: true
  consist_db_snapshot_keep_last: 3
  use_stubs: false
  models:
    land_use: urbansim
    travel: beam
    activity_demand: activitysim
    vehicle_ownership: atlas

